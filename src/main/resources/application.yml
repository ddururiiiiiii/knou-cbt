spring:
  application:
    name: knou-cbt

  datasource:
    hikari:
      maximum-pool-size: 5
      minimum-idle: 0
      initialization-fail-timeout: -1

mybatis:
  mapper-locations: classpath:/mapper/**/*.xml
  configuration:
    map-underscore-to-camel-case: true

servlet:
  multipart:
    max-file-size: 20MB
    max-request-size: 20MB

# migration
  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration

